<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="login.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMC Partner Login</title>

    <link rel="stylesheet" href="login.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="login-wrap">
  <div class="login-logo">
    <img src="https://assets.cdn.filesafe.space/B1vBwd6ELAcNBAD0bCx3/media/6a3f4b4dc492ddc24c846039.png" alt="MMC Partner Portal logo" style="max-width: 120px; height: auto;" />
  </div>
  <h1 class="login-title">MMC Partner Portal</h1>
  <p class="login-sub">Sign in to your account</p>
  <!-- Login Form -->
  <div id="login_form">
    <div class="field-group">
      <label>Email</label>
      <input id="email" type="email" placeholder="email@example.com" />
    </div>
    <div class="field-group">
      <label>Password</label>
      <input id="password" type="password" placeholder="••••••••" />
    </div>
    <button onclick="login()" class="primary-btn">Sign In</button>
    <div class="forgot-link">
      <a href="#" onclick="showForgot()">Forgot password?</a>
    </div>
    <div id="msg" class="msg"></div>
    <div class="divider"><span>New partner?</span></div>
    <a href="https://portal.membership.rundispatcher.com/register" class="register-btn">
      🚀 Create Partner Account
    </a>
  </div>
  <!-- Forgot Password Form -->
  <div id="forgot_form" style="display:none;">
    <p class="forgot-desc">Enter your email and we'll send you a reset link.</p>
    <div class="field-group">
      <label>Email</label>
      <input id="reset_email" type="email" placeholder="email@example.com" />
    </div>
    <button onclick="sendReset()" class="primary-btn">Send Reset Link</button>
    <div class="forgot-link">
      <a href="#" onclick="showLogin()">← Back to sign in</a>
    </div>
    <div id="reset_msg" class="msg"></div>
  </div>
</div>


<script src="login.js"></script>

</body>
</html>
